<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل الملف الشخصي - المركز الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    <script src="js/app.js"></script>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <button class="hamburger" onclick="toggleNav()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-right">
                <div class="logo-section">
                    <img src="Photo/logo.jpeg" alt="logo" class="logo"/>
                    <span class="clinic-name">المركز الطبي</span>
                </div>
                <div class="nav-overlay" onclick="toggleNav()"></div>
                <nav class="nav-links" id="navMenu">
                    <a href="admin/dashboard.html">لوحة التحكم</a>
                    <a href="admin/doctors.html">الأطباء</a>
                    <a href="admin/patients.html">المرضى</a>
                    <a href="admin/appointments.html">المواعيد</a>
                    <a href="profile.html" class="active">ملفي الشخصي</a>
                </nav>
            </div>
            <div class="nav-left profile-nav-left">
                <!-- Notification Bell -->
                <div x-data="{ open: false }" class="notif-wrapper">
                    <button @click="open = !open" class="notif-btn">
                        <svg class="notif-bell-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span class="notif-bell-badge">3</span>
                    </button>
                    <div x-show="open" @click.away="open = false" x-transition
                         class="notif-dropdown">
                        <div class="notif-dropdown-header">
                            <span>الإشعارات</span>
                            <button class="notif-mark-btn">تعليم الكل</button>
                        </div>
                        <div class="notif-dropdown-item unread">
                            <p>تم حجز موعد جديد من قبل محمد أحمد</p>
                            <p class="notif-time">منذ 10 دقائق</p>
                        </div>
                        <div class="notif-dropdown-item unread">
                            <p>تم إلغاء موعد من قبل سارة خالد</p>
                            <p class="notif-time">منذ ساعة</p>
                        </div>
                        <a href="admin/notifications.html" class="notif-dropdown-all">
                            عرض كل الإشعارات
                        </a>
                    </div>
                </div>
                <button class="btn btn-danger">تسجيل خروج</button>
            </div>
        </div>
    </header>

    <div class="dashboard-content">
        <div class="profile-container">

            <div class="profile-card">
                <div class="profile-card-header">
                    <h2 class="profile-section-title">تعديل المعلومات الشخصية</h2>

                    <form>
                        <div>
                            <label class="profile-label">الاسم</label>
                            <input type="text" name="name" value="أحمد محمد" required class="profile-input">
                        </div>

                        <div class="profile-field">
                            <label class="profile-label">البريد الإلكتروني</label>
                            <input type="email" name="email" value="ahmed@example.com" required class="profile-input">
                        </div>

                        <div class="profile-actions">
                            <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Change Password -->
            <div class="form-card profile-card-spacing">
                <h3 class="profile-section-subtitle">تغيير كلمة السر</h3>

                <form method="POST" action="/profile/password">
                    <input type="hidden" name="_method" value="PATCH">
                    <div class="password-fields">
                        <div>
                            <label class="profile-label">كلمة السر الحالية</label>
                            <input type="password" name="current_password" required class="password-input">
                        </div>
                        <div>
                            <label class="profile-label">كلمة السر الجديدة</label>
                            <input type="password" name="password" required class="password-input">
                        </div>
                        <div>
                            <label class="profile-label">تأكيد كلمة السر الجديدة</label>
                            <input type="password" name="password_confirmation" required class="password-input">
                        </div>
                    </div>
                    <div class="password-actions">
                        <button type="submit" class="btn btn-primary">تغيير كلمة السر</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 المركز الطبي. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
