<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد جديد - المركز الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/doctor-appointments-create.css">
    <script src="../js/app.js"></script>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <button class="hamburger" onclick="toggleNav()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-right">
                <div class="logo-section">
                    <img src="../Photo/logo.jpeg" alt="logo" class="logo"/>
                    <span class="clinic-name">المركز الطبي</span>
                </div>
                <div class="nav-overlay" onclick="toggleNav()"></div>
                <nav class="nav-links" id="navMenu">
                    <a href="dashboard.html">لوحة التحكم</a>
                    <a href="appointments.html" class="active">المواعيد</a>
                    <a href="patients.html">مرضاي</a>
                    <a href="schedule.html">الجدول</a>
                    <a href="profile.html">ملفي الشخصي</a>
                </nav>
            </div>
            <div class="nav-left">
                <div x-data="{ open: false }" class="notif-wrapper">
                    <button @click="open = !open" class="notif-btn">
                        <svg class="notif-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span class="notif-badge">3</span>
                    </button>
                    <div x-show="open" @click.away="open = false" x-transition class="notif-dropdown">
                        <div class="notif-dropdown-header">
                            <span class="notif-dropdown-title">الإشعارات</span>
                            <button class="notif-mark-btn">تعليم الكل</button>
                        </div>
                        <div class="notif-item">
                            <p class="notif-item-text">تم حجز موعد جديد من قبل محمد أحمد</p>
                            <p class="notif-item-time">منذ 10 دقائق</p>
                        </div>
                        <div class="notif-item">
                            <p class="notif-item-text">تم إلغاء موعد من قبل سارة خالد</p>
                            <p class="notif-item-time">منذ ساعة</p>
                        </div>
                        <div class="notif-item">
                            <p class="notif-item-text">تم إضافة سجل طبي للمريض عمر حسن</p>
                            <p class="notif-item-time">منذ 3 ساعات</p>
                        </div>
                        <a href="../admin/notifications.html" class="notif-view-all">
                            عرض كل الإشعارات
                        </a>
                    </div>
                </div>
                <button class="btn btn-danger">تسجيل خروج</button>
            </div>
        </div>
    </header>

    <div class="dashboard-content">
        <div class="create-appointments-container">
            <div class="form-card">
                <h2 class="create-appointments-title">حجز موعد جديد لمريض</h2>

                <form>
                    <div class="create-form-grid">
                        <div class="create-form-field">
                            <label class="form-label">اختر المريض</label>
                            <input type="text" id="patient_search" placeholder="ابحث باسم المريض..." class="form-input" style="margin-bottom: 0.5rem;">
                            <select name="patient_id" id="patient_select" required class="form-input">
                                <option value="">-- اختر المريض --</option>
                                <option value="1" data-name="محمد أحمد">محمد أحمد - 0591111111</option>
                                <option value="2" data-name="سارة خالد">سارة خالد - 0592222222</option>
                                <option value="3" data-name="عمر حسن">عمر حسن - 0593333333</option>
                                <option value="4" data-name="ليلى محمد">ليلى محمد - 0594444444</option>
                                <option value="5" data-name="نور هاني">نور هاني - 0595555555</option>
                            </select>
                        </div>

                        <div class="create-form-field">
                            <label class="form-label">التاريخ المطلوب من المريض</label>
                            <input type="date" name="requested_date" required class="form-input">
                        </div>

                        <div class="create-form-field">
                            <label class="form-label">نوع الخدمة</label>
                            <select name="disease_type" class="form-input">
                                <option value="">-- اختر نوع الخدمة --</option>
                                <optgroup label="تطعيمات الأطفال">
                                    <option value="تطعيم حديثي الولادة">تطعيم حديثي الولادة</option>
                                    <option value="تطعيم الشهر الثاني">تطعيم الشهر الثاني</option>
                                    <option value="تطعيم الشهر الرابع">تطعيم الشهر الرابع</option>
                                    <option value="تطعيم الشهر السادس">تطعيم الشهر السادس</option>
                                    <option value="تطعيم الشهر التاسع">تطعيم الشهر التاسع</option>
                                    <option value="تطعيم السنة الأولى">تطعيم السنة الأولى</option>
                                    <option value="تطعيم الصف الأول">تطعيم الصف الأول</option>
                                </optgroup>
                                <optgroup label="الحمل والحوامل">
                                    <option value="فحص حمل">فحص حمل</option>
                                    <option value="فحص ما قبل الحمل">فحص ما قبل الحمل</option>
                                    <option value="استشارة حمل">استشارة حمل</option>
                                </optgroup>
                                <optgroup label="الأمراض المزمنة">
                                    <option value="أمراض القلب">أمراض القلب</option>
                                    <option value="السكري والغدد">السكري والغدد</option>
                                    <option value="أمراض الدم">أمراض الدم</option>
                                    <option value="متابعة الأمراض المزمنة">متابعة الأمراض المزمنة</option>
                                </optgroup>
                                <optgroup label="الباطنة">
                                    <option value="الكبد الوبائي">الكبد الوبائي</option>
                                </optgroup>
                                <optgroup label="أخرى">
                                    <option value="كشف عام">كشف عام</option>
                                    <option value="استشارة">استشارة</option>
                                </optgroup>
                            </select>
                        </div>

                        <div class="create-form-field">
                            <label class="form-label">وصف حالة المريض</label>
                            <input type="text" name="patient_description" class="form-input" placeholder="أصف حالة المريض...">
                        </div>

                        <div class="create-form-field">
                            <label class="form-label">اسم الدواء</label>
                            <input type="text" name="medicine_name" class="form-input" placeholder="اسم الدواء...">
                        </div>

                        <div class="create-form-field">
                            <label class="form-label">ملاحظة الطبيب</label>
                            <textarea name="doctor_notes" rows="3" class="form-input" placeholder="ملاحظات حول العلاج..."></textarea>
                        </div>

                        <div class="create-form-field-full">
                            <label class="form-label">ملاحظات</label>
                            <textarea name="notes" rows="3" class="form-input" placeholder="ملاحظات حول الموعد..."></textarea>
                        </div>
                    </div>

                    <div class="create-form-actions">
                        <button type="submit" class="btn btn-primary">إرسال طلب للموافق</button>
                        <a href="appointments.html" class="btn btn-ghost">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 المركز الطبي. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        const searchInput = document.getElementById('patient_search');
        const patientSelect = document.getElementById('patient_select');
        const options = patientSelect.options;
        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            for (let i = 0; i < options.length; i++) {
                const optionText = options[i].text.toLowerCase();
                options[i].style.display = (searchTerm === '' || optionText.includes(searchTerm)) ? '' : 'none';
            }
        });
    </script>
</body>
</html>
