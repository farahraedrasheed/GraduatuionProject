<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد كلمة المرور - المركز الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/confirm-password.css">
</head>
<body>
    <div class="logo-container">
        <a href="index.html">
            <img src="Photo/logo.jpeg" alt="المركز الطبي" class="logo-img">
        </a>
    </div>

    <div class="auth-card">
        <p>هذه منطقة آمنة من التطبيق. يرجى تأكيد كلمة المرور قبل المتابعة.</p>

        <form method="POST" action="/confirm-password">
            <div>
                <label for="password">كلمة المرور</label>
                <input id="password" type="password" name="password" required autocomplete="current-password">
            </div>

            <div class="error-msg">
                <p>كلمة المرور غير صحيحة.</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">تأكيد</button>
            </div>
        </form>
    </div>
</body>
</html>
