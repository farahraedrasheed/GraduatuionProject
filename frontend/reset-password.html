<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور - المركز الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reset-password.css">
</head>
<body>
    <div class="logo-container">
        <a href="index.html">
            <img src="Photo/logo.jpeg" alt="المركز الطبي" class="logo-img">
        </a>
    </div>

    <div class="auth-card">
        <form method="POST" action="/reset-password">
            <input type="hidden" name="token" value="sample-reset-token-12345">

            <div>
                <label for="email">البريد الإلكتروني</label>
                <input id="email" type="email" name="email" value="user@example.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">كلمة المرور الجديدة</label>
                <input id="password" type="password" name="password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="password_confirmation">تأكيد كلمة المرور</label>
                <input id="password_confirmation" type="password" name="password_confirmation" required autocomplete="new-password">
            </div>

            <div class="error-msg">
                <p>هناك خطأ في البيانات المدخلة.</p>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">إعادة تعيين كلمة المرور</button>
            </div>
        </form>
    </div>
</body>
</html>
