<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - المركز الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .register-wrapper {
            max-width: 672px;
            margin: 3rem auto;
            padding: 2rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .register-wrapper h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #1f2937;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 600; color: #374151; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: 'Cairo', sans-serif;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .hidden { display: none; }
        .flex-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <button class="hamburger" onclick="toggleNav()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-right">
                <div class="logo-section">
                    <img src="Photo/logo.jpeg" alt="logo" class="logo"/>
                    <span class="clinic-name">المركز الطبي</span>
                </div>
                <div class="nav-overlay" onclick="toggleNav()"></div>
                <nav class="nav-links" id="navMenu">
                    <a href="index.html">الرئيسية</a>
                    <a href="about.html">من نحن</a>
                </nav>
            </div>
            <div class="nav-left">
                <a href="login.html" class="btn btn-ghost">دخول</a>
                <a href="register.html" class="btn btn-primary">حساب</a>
            </div>
        </div>
    </header>

    <main>
        <div class="register-wrapper">
            <h2>إنشاء حساب جديد</h2>

            <form>
                <div class="form-group">
                    <label for="role">نوع الحساب</label>
                    <select id="role" name="role" onchange="toggleRoleFields()">
                        <option value="patient" selected>مريض</option>
                        <option value="doctor">طبيب</option>
                    </select>
                </div>

                <div id="doctorFields" class="hidden">
                    <div class="form-group">
                        <label for="specialty">التخصص</label>
                        <select id="specialty" name="specialty">
                            <option value="">-- اختر التخصص --</option>
                            <optgroup label="طب الأطفال">
                                <option value="طب الأطفال">طب الأطفال</option>
                            </optgroup>
                            <optgroup label="الحمل والولادة">
                                <option value="نساء وتوليد">نساء وتوليد</option>
                            </optgroup>
                            <optgroup label="الأمراض المزمنة">
                                <option value="القلب والشرايين">القلب والشرايين</option>
                                <option value="السكري والغدد">السكري والغدد</option>
                                <option value="أمراض الدم">أمراض الدم</option>
                            </optgroup>
                            <optgroup label="الباطنة">
                                <option value="الباطنة">الباطنة</option>
                                <option value="الكبد الوبائي">الكبد الوبائي (الباطنة)</option>
                            </optgroup>
                            <optgroup label="طب عام">
                                <option value="طب عام">طب عام</option>
                            </optgroup>
                        </select>
                    </div>
                </div>

                <div id="patientFields">
                    <div class="form-group">
                        <label for="patient_type">فئة المريض</label>
                        <select id="patient_type" name="patient_type" onchange="toggleChronicDisease()">
                            <option value="child">طفل (طب الأطفال)</option>
                            <option value="pregnant">حامل (نساء وتوليد)</option>
                            <option value="chronic_disease">مريض مزمن</option>
                            <option value="other">أخرى</option>
                        </select>
                    </div>

                    <div id="chronicDiseaseField" class="form-group hidden">
                        <label for="chronic_disease_type">نوع المرض المزمن</label>
                        <select id="chronic_disease_type" name="chronic_disease_type">
                            <option value="">-- اختر --</option>
                            <option value="القلب والشرايين">القلب والشرايين</option>
                            <option value="أمراض الكلى">أمراض الكلى</option>
                            <option value="السكري والغدد">السكري والغدد</option>
                            <option value="أمراض الدم">أمراض الدم</option>
                            <optgroup label="الباطنة">
                                <option value="الباطنة">الباطنة</option>
                                <option value="الكبد الوبائي">الكبد الوبائي (الباطنة)</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="phone">رقم الهاتف</label>
                        <input type="tel" name="phone" placeholder="0599999999">
                    </div>

                    <div class="form-group">
                        <label for="date_of_birth">تاريخ الميلاد</label>
                        <input type="date" name="date_of_birth" onchange="calculateAge(this.value)">
                        <p id="ageDisplay" style="font-size: 0.875rem; color: #6b7280; margin-top: 0.25rem;"></p>
                        <input type="hidden" name="age" id="ageInput">
                    </div>

                    <div class="form-group">
                        <label for="gender">الجنس</label>
                        <select id="gender" name="gender">
                            <option value="male">ذكر</option>
                            <option value="female">أنثى</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="name">الاسم الكامل</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="password_confirmation">تأكيد كلمة المرور</label>
                    <input type="password" name="password_confirmation" required>
                </div>

                <div style="margin-bottom: 1rem; padding: 10px; background: #fee2e2; border-radius: 8px; display: none;">
                    <p style="color: #dc2626; font-size: 0.9rem;">هناك أخطاء في البيانات المدخلة.</p>
                </div>

                <div class="flex-row">
                    <a href="login.html" style="color: #6b7280; font-size: 0.9rem; text-decoration: underline;">لديك حساب بالفعل؟</a>
                    <button type="submit" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; padding: 10px 30px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Cairo', sans-serif;">إنشاء حساب</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 المركز الطبي. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script>
        function toggleNav() {
            document.getElementById('navMenu').classList.toggle('open');
            document.querySelector('.nav-overlay').classList.toggle('active');
        }
        function toggleRoleFields() {
            const role = document.getElementById('role').value;
            document.getElementById('patientFields').style.display = role === 'patient' ? 'block' : 'none';
            document.getElementById('doctorFields').style.display = role === 'doctor' ? 'block' : 'none';
        }
        function toggleChronicDisease() {
            const patientType = document.getElementById('patient_type').value;
            document.getElementById('chronicDiseaseField').style.display = patientType === 'chronic_disease' ? 'block' : 'none';
        }
        function calculateAge(birthDate) {
            if (!birthDate) return;
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                age--;
            }
            document.getElementById('ageDisplay').textContent = 'العمر: ' + age + ' سنة';
            document.getElementById('ageInput').value = age;
        }
        document.addEventListener('DOMContentLoaded', function() {
            toggleRoleFields();
        });
    </script>
</body>
</html>
