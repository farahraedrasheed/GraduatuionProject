<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور - المركز الطبي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forgot-password.css">
</head>
<body>
    <div class="logo-container">
        <a href="index.html">
            <img src="Photo/logo.jpeg" alt="المركز الطبي" class="logo-img">
        </a>
    </div>

    <div class="auth-card">
        <p>نسيت كلمة المرور؟ لا مشكلة. أخبرنا ببريدك الإلكتروني وسنرسل لك رابط إعادة التعيين.</p>

        <div class="success-msg" id="successMsg">تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني.</div>

        <form method="POST" action="/forgot-password">
            <div>
                <label for="email">البريد الإلكتروني</label>
                <input id="email" type="email" name="email" value="" required autofocus>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">إرسال رابط إعادة التعيين</button>
            </div>
        </form>

        <a href="login.html" class="back-link">العودة إلى تسجيل الدخول</a>
    </div>
</body>
</html>
